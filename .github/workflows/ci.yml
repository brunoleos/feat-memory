name: ci

# Segunda linha de defesa do pre-commit hook (que pode ser pulado com
# --no-verify). A matriz cross-OS torna VERIFICÁVEL a constraint C1
# ("roda em Linux, macOS e Windows nativamente"), hoje só declarada. ADR-0026.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install (editable + dev)
        run: python -m pip install -e .[dev]
      - name: Tests
        run: python -m pytest -q
      - name: Audit (segunda linha de defesa)
        run: agent-memory audit --strict --json
